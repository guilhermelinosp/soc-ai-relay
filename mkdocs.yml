site_name: SOC AI Relay
site_url: https://docs.hellnet.com.br/soc-ai-relay/
site_dir: site

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: blue

plugins:
  - search

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true

nav:
  - Início: index.md
  - Visão geral:
      - Arquitetura: architecture.md
      - Setup: setup.md
  - Operação:
      - Configuração: configuration.md
      - Deploy: deployment.md
  - Segurança: security.md

extra:
  generator: false
