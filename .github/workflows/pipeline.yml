name: pipeline

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - if: github.event_name == 'push'
        run: echo "❌ Push direto nao permitido" && exit 1
      - if: github.event_name == 'pull_request'
        run: |
          case "${{ github.head_ref }}" in feat/*) echo "✅ ${{ github.head_ref }}" ;; *) echo "❌ Use feat/*"; exit 1 ;; esac
          echo "${{ github.event.pull_request.title }}" | grep -qE '^(feat|fix|docs|style|ref|refactor|test|chore|ci|perf|build|revert)(\(.+\))?!?:\s.+' && echo "✅ PR title" || { echo "❌ Deve seguir Conventional Commits"; exit 1; }

