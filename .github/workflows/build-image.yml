name: build-image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - requirements.txt
      - mkdocs.yml
      - docs/**
      - .github/workflows/build-image.yml
  pull_request:
    paths:
      - Dockerfile
      - requirements.txt
      - mkdocs.yml
      - docs/**
      - .github/workflows/build-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, soc-ai-relay]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/hellnet-foundation/soc-ai-relay:latest
            ghcr.io/hellnet-foundation/soc-ai-relay:${{ github.sha }}
